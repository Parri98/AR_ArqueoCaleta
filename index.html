<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <title>Experiencia AR multi-marcador</title>

        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
        <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
        <script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>

        <style>
            body {
                margin: 0;
                overflow: hidden;
                font-family: Arial, sans-serif;
                background: #111;
            }

            .ar-info {
                position: fixed;
                left: 12px;
                right: 12px;
                bottom: 12px;
                z-index: 10;
                padding: 10px 12px;
                border-radius: 8px;
                background: rgba(0, 0, 0, 0.55);
                color: #fff;
                font-size: 14px;
                line-height: 1.35;
                text-align: center;
                pointer-events: none;
            }

            .camera-toggle {
                position: fixed;
                top: 12px;
                right: 12px;
                z-index: 12;
                padding: 9px 12px;
                border: 0;
                border-radius: 8px;
                background: rgba(0, 0, 0, 0.62);
                color: #fff;
                font: 700 13px Arial, sans-serif;
                cursor: pointer;
            }

            body.camera-contain #arjs-video,
            body.camera-contain video {
                object-fit: contain !important;
                background: #000 !important;
            }

            .loading-overlay {
                position: fixed;
                inset: 0;
                z-index: 20;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
                background: #111;
                color: #fff;
                text-align: center;
                transition: opacity 0.35s ease, visibility 0.35s ease;
            }

            .loading-overlay.is-hidden {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }

            .loading-panel {
                width: min(420px, 100%);
            }

            .loading-title {
                margin: 0 0 8px;
                font-size: 22px;
                font-weight: 700;
            }

            .loading-text {
                margin: 0 0 18px;
                color: rgba(255, 255, 255, 0.78);
                font-size: 15px;
                line-height: 1.45;
            }

            .loading-bar {
                height: 4px;
                overflow: hidden;
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.18);
            }

            .loading-bar::before {
                content: "";
                display: block;
                width: 42%;
                height: 100%;
                border-radius: inherit;
                background: #fff;
                animation: loading-line 1.1s ease-in-out infinite;
            }

            @keyframes loading-line {
                0% {
                    transform: translateX(-110%);
                }

                100% {
                    transform: translateX(250%);
                }
            }
        </style>
    </head>

    <body>
        <div class="loading-overlay" id="loading-overlay">
            <div class="loading-panel">
                <h1 class="loading-title">Cargando experiencia AR</h1>
                <p class="loading-text" id="loading-text">
                    Permite el acceso a la camara y espera unos segundos mientras se preparan los modelos.
                </p>
                <div class="loading-bar" aria-hidden="true"></div>
            </div>
        </div>

        <div class="ar-info" id="ar-info">Cuando se active la camara, apunta a cualquiera de los marcadores.</div>
        <button class="camera-toggle" id="camera-toggle" type="button">Quitar zoom</button>

        <a-scene
            vr-mode-ui="enabled: false;"
            loading-screen="enabled: false;"
            renderer="logarithmicDepthBuffer: true;"
            arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; sourceWidth: 640; sourceHeight: 480; displayWidth: 640; displayHeight: 480;"
            id="scene"
            embedded
            gesture-detector
        >
            <a-marker
                id="marcador-anforita"
                type="pattern"
                preset="custom"
                url="https://raw.githubusercontent.com/Parri98/AR_Anforita/main/assets/marker.patt"
                raycaster="objects: .clickable"
                emitevents="true"
                cursor="fuse: false; rayOrigin: mouse;"
            >
                <a-entity
                    id="modelo-marcador-anforita"
                    scale="7.807289909997206 7.807289909997206 7.807289909997206"
                    animation-mixer="loop: repeat"
                    gltf-model="https://raw.githubusercontent.com/Parri98/AR_Anforita/main/assets/asset.glb"
                    class="clickable"
                    gesture-handler
                ></a-entity>
            </a-marker>

            <a-marker
                id="marcador-carronada"
                type="pattern"
                preset="custom"
                url="https://raw.githubusercontent.com/Parri98/AR_Carronada/main/assets/marker.patt"
                raycaster="objects: .clickable"
                emitevents="true"
                cursor="fuse: false; rayOrigin: mouse;"
            >
                <a-entity
                    id="modelo-marcador-carronada"
                    scale="0.5514209146262659 0.5514209146262659 0.5514209146262659"
                    animation-mixer="loop: repeat"
                    gltf-model="https://raw.githubusercontent.com/Parri98/AR_Carronada/main/assets/asset.glb"
                    class="clickable"
                    gesture-handler
                ></a-entity>
            </a-marker>

            <a-marker
                id="marcador-barco-romano"
                type="pattern"
                preset="custom"
                url="https://raw.githubusercontent.com/Parri98/AR_BarcoRomano/main/assets/marker.patt"
                raycaster="objects: .clickable"
                emitevents="true"
                cursor="fuse: false; rayOrigin: mouse;"
            >
                <a-entity
                    id="modelo-marcador-barco-romano"
                    scale="0.20077887168268388 0.20077887168268388 0.20077887168268388"
                    animation-mixer="loop: repeat"
                    gltf-model="https://raw.githubusercontent.com/Parri98/AR_BarcoRomano/main/assets/asset.glb"
                    class="clickable"
                    gesture-handler
                ></a-entity>
            </a-marker>

            <a-marker
                id="marcador-cantera-caleta"
                type="pattern"
                preset="custom"
                url="https://raw.githubusercontent.com/Parri98/AR_CanteraCaleta/main/assets/marker.patt"
                raycaster="objects: .clickable"
                emitevents="true"
                cursor="fuse: false; rayOrigin: mouse;"
            >
                <a-entity
                    id="modelo-marcador-cantera-caleta"
                    scale="0.13567004728855733 0.13567004728855733 0.13567004728855733"
                    animation-mixer="loop: repeat"
                    gltf-model="https://raw.githubusercontent.com/Parri98/AR_CanteraCaleta/main/assets/asset.glb"
                    class="clickable"
                    gesture-handler
                ></a-entity>
            </a-marker>

            <a-entity camera></a-entity>
        </a-scene>

        <script>
            const scene = document.querySelector("#scene");
            const loadingOverlay = document.querySelector("#loading-overlay");
            const loadingText = document.querySelector("#loading-text");
            const info = document.querySelector("#ar-info");
            const cameraToggle = document.querySelector("#camera-toggle");
            const markers = document.querySelectorAll("a-marker");

            const loadingMessages = [
                "Preparando la camara y los marcadores...",
                "Cargando modelos 3D. Puede tardar unos segundos en el movil.",
                "Cuando aparezca la camara, enfoca uno de los marcadores impresos."
            ];

            let messageIndex = 0;
            const messageTimer = window.setInterval(() => {
                messageIndex = (messageIndex + 1) % loadingMessages.length;
                loadingText.textContent = loadingMessages[messageIndex];
            }, 2500);

            const hideLoading = () => {
                window.clearInterval(messageTimer);
                loadingOverlay.classList.add("is-hidden");
                info.textContent = "Apunta la camara a cualquiera de los marcadores.";
            };

            scene.addEventListener("loaded", () => {
                window.setTimeout(hideLoading, 400);
            });

            window.setTimeout(() => {
                if (!loadingOverlay.classList.contains("is-hidden")) {
                    hideLoading();
                }
            }, 12000);

            cameraToggle.addEventListener("click", () => {
                document.body.classList.toggle("camera-contain");
                const isContain = document.body.classList.contains("camera-contain");
                cameraToggle.textContent = isContain ? "Vista normal" : "Quitar zoom";
                info.textContent = isContain
                    ? "Vista sin recorte activada. Si el modelo se descuadra, vuelve a Vista normal."
                    : "Vista normal activada.";
            });

            markers.forEach((marker) => {
                marker.addEventListener("markerFound", () => {
                    info.textContent = "Marcador detectado. Puedes mover, rotar o acercar el modelo con los gestos.";
                });

                marker.addEventListener("markerLost", () => {
                    info.textContent = "Marcador perdido. Vuelve a enfocar el marcador con buena luz.";
                });
            });
        </script>
    </body>
</html>
